name: Deploy Production Flow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Server Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -a
            source /var/www/mistyvisuals-os/backend/.env 2>/dev/null || true
            set +a
            bash /var/www/mistyvisuals-os/deploy.sh

